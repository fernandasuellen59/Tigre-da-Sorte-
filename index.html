<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma 777</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1b2a;
  color: white;
}

.tela { display: none; padding: 20px; }
.ativa { display: block; }

.topo {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #00000050;
}

.saldo {
  background: #1e90ff;
  padding: 5px 15px;
  border-radius: 10px;
}

.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #00000090;
  padding: 10px 0;
}

.card {
  background: #ffffff10;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: gold;
  margin-top: 10px;
}

/* SLOT */
.slots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.slot {
  width: 80px;
  height: 80px;
  background: #ffffff20;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="topo">
  <h3>🎰 Cassino</h3>
  <div class="saldo">💰 <span id="saldo">100</span></div>
</div>

<!-- INICIO -->
<div id="inicio" class="tela ativa">
  <h2>Bem-vindo</h2>

  <div class="card">
    💰 Comprar moedas:
    <br>
    <button onclick="comprar(50)">R$5 = 50 moedas</button>
    <button onclick="comprar(100)">R$10 = 100 moedas</button>
  </div>
</div>

<!-- JOGOS -->
<div id="jogos" class="tela">
  <h2>🎮 Slot</h2>

  <div class="slots">
    <div class="slot" id="s1">🍒</div>
    <div class="slot" id="s2">🍋</div>
    <div class="slot" id="s3">🍉</div>
  </div>

  <button onclick="girar()">GIRAR (-10)</button>
  <p id="msg"></p>
</div>

<!-- PERFIL -->
<div id="perfil" class="tela">
  <h2>👤 Perfil</h2>
  <div class="card">Saldo: <span id="saldoPerfil">100</span></div>
</div>

<!-- MENU -->
<div class="menu">
  <div onclick="trocarTela('inicio')">🏠<br>Início</div>
  <div onclick="trocarTela('jogos')">🎮<br>Jogos</div>
  <div onclick="trocarTela('perfil')">👤<br>Perfil</div>
</div>

<script>
let saldo = localStorage.getItem("saldo") || 100;

atualizar();

function atualizar(){
  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoPerfil").innerText = saldo;
}

function trocarTela(tela){
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

function comprar(valor){
  alert("Pagamento simulado aprovado ✅");
  saldo = parseInt(saldo) + valor;
  localStorage.setItem("saldo", saldo);
  atualizar();
}

function girar(){
  if(saldo < 10){
    alert("Sem moedas!");
    return;
  }

  saldo -= 10;

  const simbolos = ["🍒","🍋","🍉","💎","7️⃣"];

  let s1 = simbolos[Math.floor(Math.random()*simbolos.length)];
  let s2 = simbolos[Math.floor(Math.random()*simbolos.length)];
  let s3 = simbolos[Math.floor(Math.random()*simbolos.length)];

  document.getElementById("s1").innerText = s1;
  document.getElementById("s2").innerText = s2;
  document.getElementById("s3").innerText = s3;

  if(s1 === s2 && s2 === s3){
    saldo += 50;
    document.getElementById("msg").innerText = "🔥 GANHOU!";
  } else {
    document.getElementById("msg").innerText = "Tente novamente";
  }

  localStorage.setItem("saldo", saldo);
  atualizar();
}
</script>

</body>
</html>
